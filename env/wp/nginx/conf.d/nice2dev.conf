server {
    listen 80;
    server_name nice2dev.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name nice2dev.com;

    ssl_certificate     /etc/nginx/certs_n2d/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs_n2d/privkey.pem;

    root /var/www/nice2dev;
    index index.php index.html;

    location / { try_files $uri /index.php?$args; }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass wordpress_n2d:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT  /var/www/html;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param SERVER_PORT 443;
        fastcgi_param REQUEST_SCHEME https;
        fastcgi_param HTTP_X_FORWARDED_PORT 443;
    }

    location = /admin {
        return 301 https://$host/wp-admin/index.php;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|ttf|otf|eot|woff|woff2)$ {
        expires 7d; access_log off; try_files $uri =404;
    }

    location /adminer/ {
        proxy_pass http://adminer_n2d:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }

    client_max_body_size 64m; sendfile on;
}
