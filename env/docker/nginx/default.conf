# ============================================================
# AudioVerse - nginx reverse proxy
# ============================================================
#
# Routing:
#   audioverse.io              -> react:80       (SPA)
#   api.audioverse.io          -> api:5000       (API)
#   identity.audioverse.io     -> identity:5002  (IdentityServer)
#   storybook.audioverse.io    -> storybook:80   (Storybook UI catalog)
#
# Upstreams resolved dynamically via Docker DNS (127.0.0.11)
# so nginx starts even if backend containers are not ready yet.
# ============================================================

# ============================================================
# Default: catch-all (IP / unknown host) -> close
# nginx MUST start even without certs so HTTP->HTTPS redirect
# and Let's Encrypt challenges can work.
# ============================================================
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# ============================================================
# Frontend: audioverse.io -> React SPA
# ============================================================
server {
    listen 80;
    server_name audioverse.io www.audioverse.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name audioverse.io www.audioverse.io;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        set $frontend_upstream http://react:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

# ============================================================
# API: api.audioverse.io -> av-api
# ============================================================
server {
    listen 80;
    server_name api.audioverse.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.audioverse.io;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        set $api_upstream http://api:5000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

