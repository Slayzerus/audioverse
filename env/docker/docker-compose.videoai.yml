# docker-compose.videoai.yml
# Uruchamianie serwisów "video" pod profilem: aivideo
# Wymaga istniejącej sieci zewnętrznej ${NETWORK_NAME} (tworzy ją start-all.ps1)

name: proj-videoai

services:
  video_mediapipe:
    profiles: ["aivideo"]
    build:
      context: ${VIDEO_MEDIAPIPE_BUILD_CONTEXT:-./ai/mediapipe}
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MEDIAPIPE_HTTP:-8101}:8080"
    environment:
      - MODELS_DIR=/models
    volumes:
      - ${MEDIAPIPE_MODELS_DIR:-./ai/mediapipe/models}:/models:ro
    networks: [audioverse-net]
    logging:
      driver: json-file
      options:
        max-size: "10m"

  video_openpose:
    profiles: ["aivideo"]
    build:
      context: ${VIDEO_OPENPOSE_BUILD_CONTEXT:-./ai/openpose}
      dockerfile: Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    ports:
      - "${OPENPOSE_HTTP:-8102}:8080"
    environment:
      - MODELS_DIR=/models
    volumes:
      - ${OPENPOSE_MODELS_DIR:-./ai/openpose/models}:/models:ro
    networks: [audioverse-net]
    logging:
      driver: json-file
      options:
        max-size: "10m"

  video_alphapose:
    profiles: ["aivideo"]
    build:
      context: ${VIDEO_ALPHAPOSE_BUILD_CONTEXT:-./ai/alphapose}
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ALPHAPOSE_HTTP:-8103}:8080"
    environment:
      - MODELS_DIR=/models
    volumes:
      - ${ALPHAPOSE_MODELS_DIR:-./ai/alphapose/models}:/models:ro
    networks: [audioverse-net]
    logging:
      driver: json-file
      options:
        max-size: "10m"

  video_vitpose:
    profiles: ["aivideo"]
    build:
      context: ${VIDEO_VITPOSE_BUILD_CONTEXT:-./ai/vitpose}
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${VITPOSE_HTTP:-8104}:8080"
    environment:
      - MODELS_DIR=/models
    volumes:
      - ${VITPOSE_MODELS_DIR:-./ai/vitpose/models}:/models:ro
    networks: [audioverse-net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
  
  video_poseformer:
    profiles: ["aivideo"]
    build:
      context: ${POSEFORMER_BUILD_CONTEXT:-./ai/poseformer}
      dockerfile: Dockerfile
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    ports:
      - "${POSEFORMER_HTTP:-8104}:8080"
    environment:
      - POSEFORMER_CHECKPOINT=${POSEFORMER_CHECKPOINT:-/weights/poseformer.pth}
    volumes:
      - ${POSEFORMER_WEIGHTS_DIR:-./ai/poseformer/weights}:/weights:ro
    networks: [audioverse-net]
    logging:
      driver: json-file
      options:
        max-size: "10m"


networks:
  audioverse-net:
    external: true
    name: ${NETWORK_NAME:-audioverse-net}
