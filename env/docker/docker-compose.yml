name: ${COMPOSE_PROJECT_NAME:-proj-core}

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ${HOST_DB_DIR}/data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks: [audioverse-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [audioverse-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks: [audioverse-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  identity:
    image: ${IMAGE_IDENTITY}
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: "http://+:5002;https://+:5003"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "${ASPNETCORE_CERT_PASSWORD:-changeit}"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/aspnetapp.pfx"
    volumes:
      - ${HOST_HTTPS_DIR}:/https:ro
    ports:
      - "${IDENTITY_HTTP:-5002}:5002"
      - "${IDENTITY_HTTPS:-5003}:5003"
    depends_on: [postgres, redis]
    networks: [audioverse-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  library:
    image: ${IMAGE_LIBRARY}
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: "http://+:5004;https://+:5005"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "${ASPNETCORE_CERT_PASSWORD:-changeit}"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/aspnetapp.pfx"
    volumes:
      - ${HOST_HTTPS_DIR}:/https:ro
      - ${HOST_DATA_DIR}:/data
    ports:
      - "${LIBRARY_HTTP:-5004}:5004"
      - "${LIBRARY_HTTPS:-5005}:5005"
    depends_on: [postgres]
    networks: [audioverse-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  api:
    image: ${IMAGE_API}
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: "http://+:5000;https://+:5001"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "${ASPNETCORE_CERT_PASSWORD:-changeit}"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/aspnetapp.pfx"
    volumes:
      - ${HOST_HTTPS_DIR}:/https:ro
    ports:
      - "${API_HTTP:-5000}:5000"
      - "${API_HTTPS:-5001}:5001"
    depends_on: [identity, library]
    networks: [audioverse-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  react:
    image: ${IMAGE_REACT}
    restart: unless-stopped
    ports:
      - "${WEB_HTTP:-8081}:80"
      - "${WEB_HTTPS:-8443}:443"
    volumes:
      - ${HOST_CONF_DIR}/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${HOST_CERTS_DIR}:/certs:ro
    networks: [audioverse-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

asr_fw:
  image: ${IMAGE_ASR_FW:-fedirz/faster-whisper-server:latest-cpu}
  restart: unless-stopped
  environment:
    UVICORN_WORKERS: "1"
  # ports:        # odkomentuj, jeśli chcesz testować z hosta
  #   - "${ASR_FW_PORT:-8000}:8000"
  profiles: ["aiaudio"]
  networks: [audioverse-net]
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

asr_vosk:
  image: alphacep/kaldi-en:latest
  restart: unless-stopped
  ports:
    - "${ASR_VOSK_PORT:-8020}:2700"
  networks:
    - ${NETWORK_NAME}
  healthcheck:
    test: ["CMD-SHELL","nc -z 127.0.0.1 2700 || exit 1"]
    interval: 10s
    timeout: 3s
    retries: 10
    start_period: 20s

tts_piper:
  image: ${IMAGE_TTS_PIPER:-artibex/piper-http:latest}
  restart: unless-stopped
  # ports:
  #   - "${PIPER_HTTP:-5000}:5000"   # koliduje z API – zostawiam wyłączone
  profiles: ["aiaudio"]
  networks: [audioverse-net]
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

