# AI Motion sidecar services — text-to-motion generation
# Usage: docker compose -f docker-compose.motion.yml up -d
#
# All 3 engines expose the same REST API contract:
#   POST /generate       → JSON (frames + joints)
#   POST /generate/bvh   → raw BVH file
#   GET  /health         → { "status": "ok", "engine": "..." }
#
# Without GPU/checkpoints, engines run in DEMO mode (sine-wave motion).

services:
  motion_gpt:
    build:
      context: ai-motion
      dockerfile: Dockerfile.motiongpt
    ports:
      - "8300:8300"
    restart: unless-stopped
    environment:
      - MOTIONGPT_CONFIG=configs/default.yaml
      - MOTIONGPT_CHECKPOINT=checkpoints/motiongpt.pth
    # Uncomment for GPU:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  motion_mdm:
    build:
      context: ai-motion
      dockerfile: Dockerfile.mdm
    ports:
      - "8301:8301"
    restart: unless-stopped
    environment:
      - MDM_CHECKPOINT=save/humanml_trans_enc_512/model000200000.pt
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  motion_momask:
    build:
      context: ai-motion
      dockerfile: Dockerfile.momask
    ports:
      - "8302:8302"
    restart: unless-stopped
    environment:
      - MOMASK_VQ_CHECKPOINT=checkpoints/vq/best.tar
      - MOMASK_T2M_CHECKPOINT=checkpoints/t2m/best.tar
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
