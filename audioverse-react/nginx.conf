server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker — NEVER cache (browser must always check for updates)
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # index.html — no cache (so new deploys are picked up immediately)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed assets — return 404 if missing (never fallback to index.html)
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Other static files with caching (fonts, images)
    location ~* \.(?:svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — only for HTML navigation
    location / {
        try_files $uri $uri/ /index.html;
    }
}
