<svg width="50" height="50" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. Mikrofon na scenie -->
    <g id="microphone-stage">
        <!-- Scena -->
        <ellipse cx="50" cy="90" rx="40" ry="10" fill="#795548"/>
        <!-- Mikrofon -->
        <rect x="45" y="40" width="10" height="40" fill="#03a9f4"/>
        <circle cx="50" cy="30" r="12" fill="#03a9f4"/>
        <!-- Światła sceniczne -->
        <circle cx="20" cy="20" r="5" fill="#ffeb3b"/>
        <circle cx="80" cy="20" r="5" fill="#ffeb3b"/>
    </g>
</svg>
